version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ohdsi-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:$${ELASTIC_PASSWORD} -f http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ohdsi-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ohdsi-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ohdsi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgresql:
    image: postgres:15-alpine
    container_name: ohdsi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ohdsi_dashboard
      POSTGRES_USER: ohdsi_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohdsi_user -d ohdsi_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ohdsi-network

  redis:
    image: redis:7-alpine
    container_name: ohdsi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ohdsi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ohdsi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ohdsi_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgresql:5432/${POSTGRES_DB:-ohdsi_dashboard}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      DISCOURSE_API_KEY: ${DISCOURSE_API_KEY}
      NCBI_ENTREZ_EMAIL: ${NCBI_ENTREZ_EMAIL}
      NCBI_ENTREZ_API_KEY: ${NCBI_ENTREZ_API_KEY}
      USE_GPT_SCORING: ${USE_GPT_SCORING:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ohdsi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ohdsi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: /graphql
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ohdsi-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ohdsi-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ohdsi_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgresql:5432/${POSTGRES_DB:-ohdsi_dashboard}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_WORKER_RUNNING: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      DISCOURSE_API_KEY: ${DISCOURSE_API_KEY}
      NCBI_ENTREZ_EMAIL: ${NCBI_ENTREZ_EMAIL}
      NCBI_ENTREZ_API_KEY: ${NCBI_ENTREZ_API_KEY}
      USE_GPT_SCORING: ${USE_GPT_SCORING:-true}
    depends_on:
      - redis
      - postgresql
      - elasticsearch
    volumes:
      - ./backend:/app
    networks:
      - ohdsi-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ohdsi-celery-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ohdsi_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgresql:5432/${POSTGRES_DB:-ohdsi_dashboard}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_WORKER_RUNNING: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - redis
      - postgresql
      - elasticsearch
    volumes:
      - ./backend:/app
    networks:
      - ohdsi-network

volumes:
  elasticsearch_data:
  postgres_data:
  redis_data:

networks:
  ohdsi-network:
    driver: bridge